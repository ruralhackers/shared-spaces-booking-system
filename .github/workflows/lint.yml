name: Lint

on: [push, pull_request]

jobs:
  lint-check:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.2.2

      - name: Run Biome CI (errors only)
        run: biome ci --diagnostic-level=error .

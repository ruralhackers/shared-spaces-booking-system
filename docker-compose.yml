version: "3.8"

volumes:
  ddd-fullstack-starter-redis:

services:
  redis:
    image: redis:7
    container_name: ddd-fullstack-starter-redis
    command: redis-server --save 20 1 --loglevel warning --requirepass unarayademetralha
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ddd-fullstack-starter-redis:/data
